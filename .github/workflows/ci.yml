name: CI
on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip jsonschema pytest
      - run: python scripts/schema_lint.py
      - run: pytest -q pc/tests pi4/tests cloud/tests
